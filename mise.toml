[tools]
node = "22.22.1"
pnpm = "10.32.0"
go = "1.25.8"
golangci-lint = "2.11.3"
dprint = "0.52.0"
hk = "1.38.0"
pkl = "0.31.0"
"npm:@tobilu/qmd" = "1.1.5"
"npm:@withgraphite/graphite-cli" = "1.7.20"
"npm:@infisical/cli" = "0.43.40"
"ubi:jdx/fnox" = "1.17.0"
watchexec = "2.5.0"

[env]
HK_MISE = "1"
QMD_INDEX = "open-platform"
QMD_COLLECTION = "docs"

[tasks."docs:qmd:ensure"]
description = "Ensure the repo QMD collection exists"
run = '''
set -eu
if ! qmd --index "$QMD_INDEX" collection list | grep -q "^$QMD_COLLECTION "; then
  qmd --index "$QMD_INDEX" collection add ./docs --name "$QMD_COLLECTION"
  qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION" "Canonical Open Platform repository docs. Start with docs/README.md for navigation and source-of-truth rules."
  qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION/adr" "Durable architecture decisions and rationale. Use for why and durable choices."
  qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION/specs" "Current intended design and implementation requirements. Use for what should be true now."
  qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION/plans" "Execution plans, milestones, blockers, and mutable work. Use for sequencing and next steps."
fi
'''

[tasks."docs:qmd:init"]
description = "Sync the repo QMD collection and contexts"
run = '''
set -eu
mise run docs:qmd:ensure
qmd --index "$QMD_INDEX" context rm "qmd://$QMD_COLLECTION/plans" >/dev/null 2>&1 || true
qmd --index "$QMD_INDEX" context rm "qmd://$QMD_COLLECTION/specs" >/dev/null 2>&1 || true
qmd --index "$QMD_INDEX" context rm "qmd://$QMD_COLLECTION/adr" >/dev/null 2>&1 || true
qmd --index "$QMD_INDEX" context rm "qmd://$QMD_COLLECTION" >/dev/null 2>&1 || true
qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION" "Canonical Open Platform repository docs. Start with docs/README.md for navigation and source-of-truth rules."
qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION/adr" "Durable architecture decisions and rationale. Use for why and durable choices."
qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION/specs" "Current intended design and implementation requirements. Use for what should be true now."
qmd --index "$QMD_INDEX" context add "qmd://$QMD_COLLECTION/plans" "Execution plans, milestones, blockers, and mutable work. Use for sequencing and next steps."
'''

[tasks."docs:qmd:update"]
description = "Update the repo QMD index"
run = '''
set -eu
mise run docs:qmd:ensure
qmd --index "$QMD_INDEX" update
'''

[tasks."docs:qmd:embed"]
description = "Generate semantic embeddings for repo docs"
run = '''
set -eu
mise run docs:qmd:ensure
qmd --index "$QMD_INDEX" embed
'''

[tasks."docs:qmd:refresh"]
description = "Refresh the repo QMD index and embeddings"
sources = ["docs/**/*.md", "mise.toml"]
run = '''
set -eu
mise run docs:qmd:update
qmd --index "$QMD_INDEX" embed
'''

[tasks."docs:qmd:watch"]
description = "Watch docs and refresh QMD automatically"
run = '''
set -eu
mise run docs:qmd:init
mise watch docs:qmd:refresh --on-busy-update queue --debounce 2s
'''

[tasks."docs:qmd:status"]
description = "Show repo QMD index status"
run = '''
set -eu
mise run docs:qmd:ensure
qmd --index "$QMD_INDEX" status
'''

[tasks."docs:qmd:smoke"]
description = "Run smoke searches against the repo QMD index"
run = '''
set -eu
mise run docs:qmd:update
qmd --index "$QMD_INDEX" search "runtime secret materialization" -c "$QMD_COLLECTION" -n 3 >/dev/null
qmd --index "$QMD_INDEX" search "session index api contract" -c "$QMD_COLLECTION" -n 3 >/dev/null
qmd --index "$QMD_INDEX" search "localhost-only exposure" -c "$QMD_COLLECTION" -n 3 >/dev/null
echo "QMD smoke queries completed"
'''

[tasks.fmt]
description = "Format repo-managed sources"
run = "pnpm exec nx run repo:fmt"

[tasks."fmt:check"]
description = "Check repo formatting"
run = "pnpm exec nx run repo:fmt-check"

[tasks.lint]
description = "Run all lint checks"
run = "pnpm exec nx run repo:lint"

[tasks."lint:ts"]
description = "Run TypeScript lint checks"
run = "pnpm exec nx run repo:lint-ts"

[tasks."lint:go"]
description = "Run Go lint checks"
run = "pnpm exec nx run repo:lint-go"

[tasks.typecheck]
description = "Run all type checks"
run = "pnpm exec nx run repo:typecheck"

[tasks."typecheck:ts"]
description = "Run TypeScript type checks"
run = "pnpm exec nx run repo:typecheck-ts"

[tasks.build]
description = "Run all build targets"
run = "pnpm exec nx run repo:build"

[tasks."build:ts"]
description = "Run TypeScript build targets"
run = "pnpm exec nx run repo:build-ts"

[tasks."build:go"]
description = "Run Go build targets"
run = "pnpm exec nx run repo:build-go"

[tasks."secrets:scan"]
description = "Run repo secret scanning"
run = "pnpm exec nx run repo:secrets-scan"

[tasks.test]
description = "Run fast local tests"
run = "pnpm exec nx run repo:test"

[tasks."test:go"]
description = "Run Go tests"
run = "pnpm exec nx run repo:test-go"

[tasks."test:ts"]
description = "Run TypeScript tests"
run = "pnpm exec nx run repo:test-ts"

[tasks."test:contract"]
description = "Run contract tests"
run = "pnpm exec nx run repo:test-contract"

[tasks."test:integration"]
description = "Run integration tests"
run = "pnpm exec nx run repo:test-integration"

[tasks."test:e2e"]
description = "Run end-to-end tests"
run = "pnpm exec nx run repo:test-e2e"

[tasks."cluster:smoke"]
description = "Run cluster smoke validation"
run = "pnpm exec nx run repo:cluster-smoke"

[tasks."security:smoke"]
description = "Run security smoke validation"
run = "pnpm exec nx run repo:security-smoke"

[tasks."obs:smoke"]
description = "Run observability smoke validation"
run = "pnpm exec nx run repo:obs-smoke"

[tasks.validate]
description = "Run fast checks and builds"
run = "pnpm exec nx run repo:validate"

[tasks.check]
description = "Run the fast local check loop"
run = "pnpm exec nx run repo:check"

[tasks."dev:tilt"]
description = "Run optional Tilt accelerator"
run = "pnpm exec nx run repo:dev-tilt"
